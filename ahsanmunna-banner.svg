<svg width="1500" height="300" viewBox="0 0 1500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="300" fill="url(#bgGrad)"/>

  <!-- Neural network - LEFT SIDE -->
  <line x1="60" y1="60" x2="160" y2="110" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="60" y1="60" x2="160" y2="160" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="150" x2="160" y2="110" stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="150" x2="160" y2="200" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="60" y1="240" x2="160" y2="200" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="240" x2="160" y2="160" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="160" y1="110" x2="260" y2="80" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="160" y1="110" x2="260" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.25"/>
  <line x1="160" y1="160" x2="260" y2="80" stroke="#a855f7" stroke-width="0.8" opacity="0.2"/>
  <line x1="160" y1="160" x2="260" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="160" y1="160" x2="260" y2="240" stroke="#a855f7" stroke-width="0.8" opacity="0.25"/>
  <line x1="160" y1="200" x2="260" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.2"/>
  <line x1="160" y1="200" x2="260" y2="240" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>

  <circle cx="60" cy="60" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="60" cy="150" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="60" cy="240" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="160" cy="110" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="160" cy="160" r="5" fill="#a855f7" opacity="0.9" filter="url(#glow)"/>
  <circle cx="160" cy="200" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="260" cy="80" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="260" cy="160" r="5" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="260" cy="240" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>

  <!-- Neural network - RIGHT SIDE -->
  <line x1="1440" y1="60" x2="1340" y2="110" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="1440" y1="60" x2="1340" y2="160" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="1440" y1="150" x2="1340" y2="110" stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="1440" y1="150" x2="1340" y2="200" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="1440" y1="240" x2="1340" y2="200" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="1340" y1="110" x2="1240" y2="80" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="1340" y1="110" x2="1240" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.25"/>
  <line x1="1340" y1="160" x2="1240" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>
  <line x1="1340" y1="160" x2="1240" y2="240" stroke="#a855f7" stroke-width="0.8" opacity="0.25"/>
  <line x1="1340" y1="200" x2="1240" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.2"/>
  <line x1="1340" y1="200" x2="1240" y2="240" stroke="#a855f7" stroke-width="0.8" opacity="0.3"/>

  <circle cx="1440" cy="60" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1440" cy="150" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1440" cy="240" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1340" cy="110" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1340" cy="160" r="5" fill="#a855f7" opacity="0.9" filter="url(#glow)"/>
  <circle cx="1340" cy="200" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1240" cy="80" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="1240" cy="160" r="5" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="1240" cy="240" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>

  <!-- Dot grid -->
  <g opacity="0.15" fill="#00d4ff">
    <circle cx="350" cy="30" r="1.5"/><circle cx="400" cy="30" r="1.5"/><circle cx="450" cy="30" r="1.5"/>
    <circle cx="500" cy="30" r="1.5"/><circle cx="550" cy="30" r="1.5"/><circle cx="600" cy="30" r="1.5"/>
    <circle cx="650" cy="30" r="1.5"/><circle cx="700" cy="30" r="1.5"/><circle cx="750" cy="30" r="1.5"/>
    <circle cx="800" cy="30" r="1.5"/><circle cx="850" cy="30" r="1.5"/><circle cx="900" cy="30" r="1.5"/>
    <circle cx="950" cy="30" r="1.5"/><circle cx="1000" cy="30" r="1.5"/><circle cx="1050" cy="30" r="1.5"/>
    <circle cx="1100" cy="30" r="1.5"/>
    <circle cx="350" cy="270" r="1.5"/><circle cx="400" cy="270" r="1.5"/><circle cx="450" cy="270" r="1.5"/>
    <circle cx="500" cy="270" r="1.5"/><circle cx="550" cy="270" r="1.5"/><circle cx="600" cy="270" r="1.5"/>
    <circle cx="650" cy="270" r="1.5"/><circle cx="700" cy="270" r="1.5"/><circle cx="750" cy="270" r="1.5"/>
    <circle cx="800" cy="270" r="1.5"/><circle cx="850" cy="270" r="1.5"/><circle cx="900" cy="270" r="1.5"/>
    <circle cx="950" cy="270" r="1.5"/><circle cx="1000" cy="270" r="1.5"/><circle cx="1050" cy="270" r="1.5"/>
    <circle cx="1100" cy="270" r="1.5"/>
  </g>

  <!-- Glowing orb behind name -->
  <ellipse cx="750" cy="148" rx="300" ry="100" fill="#a855f7" opacity="0.04" filter="url(#softGlow)"/>
  <ellipse cx="750" cy="148" rx="200" ry="70" fill="#00d4ff" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Divider lines -->
  <rect x="300" y="68" width="900" height="1" fill="url(#lineGrad)" opacity="0.4"/>
  <rect x="300" y="225" width="900" height="1" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- Bracket decorations -->
  <path d="M 310 80 L 295 80 L 295 215 L 310 215" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#glow)"/>
  <path d="M 1190 80 L 1205 80 L 1205 215 L 1190 215" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#glow)"/>

  <!-- MAIN NAME -->
  <text x="750" y="165"
        font-family="'Courier New', Courier, monospace"
        font-size="78"
        font-weight="900"
        letter-spacing="14"
        text-anchor="middle"
        fill="url(#nameGrad)"
        filter="url(#strongGlow)">AHSAN MUNNA</text>

  <!-- Username bottom left -->
  <text x="340" y="255"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        letter-spacing="3"
        fill="#00d4ff"
        opacity="0.6"
        filter="url(#glow)">@ahsanmunna</text>

  <!-- Bangladesh bottom right -->
  <text x="1160" y="255"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        letter-spacing="3"
        fill="#a855f7"
        opacity="0.6"
        text-anchor="end">🇧🇩 BANGLADESH</text>

  <!-- Corner dots -->
  <circle cx="30" cy="25" r="3" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="45" cy="25" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="30" cy="40" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="1470" cy="25" r="3" fill="#a855f7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1455" cy="25" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="1470" cy="40" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="30" cy="275" r="3" fill="#a855f7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="45" cy="275" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="30" cy="260" r="2" fill="#a855f7" opacity="0.3"/>
  <circle cx="1470" cy="275" r="3" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1455" cy="275" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="1470" cy="260" r="2" fill="#00d4ff" opacity="0.3"/>

  <!-- Border -->
  <rect x="1" y="1" width="1498" height="298" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
</svg>
